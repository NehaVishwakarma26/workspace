<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">Create Project</h1>

            <div class="alert alert-info">
                <div><strong>Team:</strong> <span th:text="${team.teamName}"></span></div>
                <div><strong>Team ID:</strong> <span th:text="${team.teamId}"></span></div>
            </div>

            <form th:object="${project}"
                  th:action="@{/project/team/{teamId}/save(teamId=${team.teamId})}"
                  method="POST"
                  class="row g-3">
                <div class="col-12">
                    <label class="form-label">Project Name</label>
                    <input type="text" th:field="*{projectName}" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Start Date</label>
                    <input type="date" th:field="*{startDate}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Due Date</label>
                    <input type="date" th:field="*{dueDate}" class="form-control">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create Project</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

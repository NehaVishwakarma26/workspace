<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Employee Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <h1 class="h3 mb-1">Employee Details Page</h1>
                    <p class="text-muted mb-0">Profile overview and management actions</p>
                </div>
                <form th:action="@{/logout}" method="POST">
                    <button type="submit" class="btn btn-outline-danger">Logout</button>
                </form>
            </div>

            <dl class="row mb-0">
                <dt class="col-sm-3">First Name</dt>
                <dd class="col-sm-9" th:text="${employee.firstName}"></dd>
                <dt class="col-sm-3">Last Name</dt>
                <dd class="col-sm-9" th:text="${employee.lastName}"></dd>
                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${employee.email}"></dd>
                <dt class="col-sm-3">Department</dt>
                <dd class="col-sm-9" th:text="${employee.department}"></dd>
                <dt class="col-sm-3">Role</dt>
                <dd class="col-sm-9" th:text="${employee.role}"></dd>
                <dt class="col-sm-3">Designation</dt>
                <dd class="col-sm-9" th:text="${employee.designation}"></dd>
            </dl>

            <div class="d-flex gap-2 mt-4">
                <a sec:authorize="hasRole('EMPLOYEE')" th:href="@{/employee/me/update}" class="btn btn-primary">Update</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/employee/saveUpdatedEmployee/{employeeId}(employeeId=${employee.employeeId})}" class="btn btn-primary">Update</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

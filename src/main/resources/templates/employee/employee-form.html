<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">Employee Form</h1>

            <form action="#" th:action="@{/employee/saveEmployee}" th:object="${employee}" method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">First name</label>
                    <input type="text" th:field="*{firstName}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last name</label>
                    <input type="text" th:field="*{lastName}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="text" th:field="*{email}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="role">Role</label>
                    <select id="role" th:field="*{role}" class="form-select">
                        <option th:each="roleOpt:${roles}" th:value="${roleOpt.name()}" th:text="${roleOpt.name()}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="department">Department</label>
                    <select id="department" th:field="*{department}" class="form-select">
                        <option th:each="deptOpt:${departments}" th:value="${deptOpt.name()}" th:text="${deptOpt.name()}"></option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Designation</label>
                    <input type="text" th:field="*{designation}" class="form-control">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

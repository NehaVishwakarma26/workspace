<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Employee List</h1>
    <form th:action="@{/logout}" method="POST">
      <button type="submit" class="btn btn-outline-danger">Logout</button>
    </form>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form class="row g-3 align-items-end" action="#" th:action="@{/employee/list}" method="GET">
        <div class="col-md-4">
          <label class="form-label" for="department">Department</label>
          <select id="department" name="department" class="form-select">
            <option value="">All Departments</option>
            <option th:each="deptOpt:${departments}" th:value="${deptOpt.name()}" th:text="${deptOpt.name()}"></option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="role">Role</label>
          <select id="role" name="role" class="form-select">
            <option value="">All Roles</option>
            <option th:each="roleOpt:${roles}" th:value="${roleOpt.name()}" th:text="${roleOpt.name()}"></option>
          </select>
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn btn-primary">Filter</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0 align-middle">
        <thead class="table-dark">
        <tr>
          <th>Employee ID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Details</th>
          <th>Update</th>
          <th>Deactivate</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp:${employees}">
          <td th:text="${emp.employeeId}"></td>
          <td th:text="${emp.firstName}"></td>
          <td th:text="${emp.lastName}"></td>
          <td><a class="btn btn-sm btn-outline-primary" th:href="@{/employee/detail/{employeeId}(employeeId=${emp.employeeId})}">Details</a></td>
          <td><a class="btn btn-sm btn-outline-secondary" th:href="@{/employee/update/{employeeId}(employeeId=${emp.employeeId})}">Update</a></td>
          <td><a class="btn btn-sm btn-outline-danger" th:href="@{/employee/deactivate/{employeeId}(employeeId=${emp.employeeId})}">Deactivate</a></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

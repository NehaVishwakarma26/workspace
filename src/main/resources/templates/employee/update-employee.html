<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Update Employee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 760px;">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">Update Employee</h1>

            <form th:object="${employee}" action="#" th:action="@{/employee/saveUpdatedEmployee/{employeeId}(employeeId=${employee.employeeId})}" method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input th:value="*{firstName}" type="text" th:field="*{firstName}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input th:value="*{lastName}" type="text" th:field="*{lastName}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input th:value="*{email}" type="text" th:field="*{email}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Designation</label>
                    <input th:value="*{designation}" type="text" th:field="*{designation}" class="form-control">
                </div>

                <div sec:authorize="hasRole('SUPER_ADMIN')" class="col-12 row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Department</label>
                        <select th:field="*{department}" class="form-select">
                            <option th:each="deptOpt : ${departments}"
                                    th:value="${deptOpt}"
                                    th:text="${deptOpt}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select th:field="*{role}" class="form-select">
                            <option th:each="roleOpt : ${roles}"
                                    th:value="${roleOpt}"
                                    th:text="${roleOpt}">
                            </option>
                        </select>
                    </div>
                </div>

                <div sec:authorize="hasRole('ADMIN')" class="col-12">
                    <div class="alert alert-secondary mb-0">
                        <div><strong>Department:</strong> <span th:text="*{department}"></span></div>
                        <div><strong>Role:</strong> <span th:text="*{role}"></span></div>
                        <input type="hidden" th:field="*{department}">
                        <input type="hidden" th:field="*{role}">
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

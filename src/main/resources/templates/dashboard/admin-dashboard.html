<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                        <div>
                            <p class="text-uppercase text-muted small mb-1">Department Overview</p>
                            <h1 class="display-6 mb-0">Admin Dashboard</h1>
                        </div>
                        <div class="badge text-bg-primary fs-6 px-3 py-2" th:text="${admin.department} + ' Department'"></div>
                    </div>

                    <div class="row g-3">
                        <div class="col-6 col-xl-4">
                            <div class="card h-100 border-0 bg-primary-subtle">
                                <div class="card-body">
                                    <div class="text-muted small">Employees</div>
                                    <div class="display-6 fw-semibold" th:text="${employeeCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-4">
                            <div class="card h-100 border-0 bg-success-subtle">
                                <div class="card-body">
                                    <div class="text-muted small">Teams</div>
                                    <div class="display-6 fw-semibold" th:text="${teamCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-4">
                            <div class="card h-100 border-0 bg-warning-subtle">
                                <div class="card-body">
                                    <div class="text-muted small">Projects</div>
                                    <div class="display-6 fw-semibold" th:text="${projectCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-6">
                            <div class="card h-100 border-0 bg-info-subtle">
                                <div class="card-body">
                                    <div class="text-muted small">Tasks</div>
                                    <div class="display-6 fw-semibold" th:text="${taskCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-xl-6">
                            <div class="card h-100 border-0 bg-success-subtle">
                                <div class="card-body">
                                    <div class="text-muted small">Completed Tasks</div>
                                    <div class="display-6 fw-semibold" th:text="${completedTaskCount}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <a th:href="@{/employee/list}" class="btn btn-primary">Employees</a>
                        <a th:href="@{/team/list}" class="btn btn-outline-primary">Teams</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Super Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <p class="text-uppercase text-muted small mb-1">Organization Overview</p>
                    <h1 class="display-6 mb-4">Super Admin Dashboard</h1>

                    <div class="row g-3">
                        <div class="col-6 col-xl-4">
                            <div class="card border-0 bg-primary-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">Total Employees</div>
                                    <div class="display-6 fw-semibold" th:text="${employeeCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-4">
                            <div class="card border-0 bg-success-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">Total Teams</div>
                                    <div class="display-6 fw-semibold" th:text="${teamCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-4">
                            <div class="card border-0 bg-warning-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">Total Projects</div>
                                    <div class="display-6 fw-semibold" th:text="${projectCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-6">
                            <div class="card border-0 bg-info-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">Total Tasks</div>
                                    <div class="display-6 fw-semibold" th:text="${taskCount}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-xl-6">
                            <div class="card border-0 bg-success-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">Completed Tasks</div>
                                    <div class="display-6 fw-semibold" th:text="${completedTaskCount}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <a th:href="@{/employee/list}" class="btn btn-primary">Manage Employees</a>
                        <a th:href="@{/team/list}" class="btn btn-outline-primary">Manage Teams</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

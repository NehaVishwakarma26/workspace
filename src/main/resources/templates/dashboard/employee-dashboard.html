<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-11">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body p-4 p-md-5">
                    <p class="text-uppercase text-muted small mb-1">Personal Workspace</p>
                    <h1 class="display-6 mb-2">Employee Dashboard</h1>
                    <h2 class="h4 text-primary mb-4" th:text="'Welcome, ' + ${employee.firstName}"></h2>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-4">
                            <div class="card border-0 bg-warning-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">TODO</div>
                                    <div class="display-6 fw-semibold" th:text="${todoTasks}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="card border-0 bg-info-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">In Progress</div>
                                    <div class="display-6 fw-semibold" th:text="${inProgressTasks}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="card border-0 bg-success-subtle h-100">
                                <div class="card-body">
                                    <div class="text-muted small">Completed</div>
                                    <div class="display-6 fw-semibold" th:text="${completedTasks}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-12 col-lg-4">
                            <div class="card h-100">
                                <div class="card-header bg-white">
                                    <h3 class="h5 mb-0">My Teams</h3>
                                </div>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item" th:each="membership : ${memberships}" th:text="${membership.team.teamName}"></li>
                                </ul>
                            </div>
                        </div>
                        <div class="col-12 col-lg-8">
                            <div class="card h-100">
                                <div class="card-header bg-white">
                                    <h3 class="h5 mb-0">My Tasks</h3>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-striped table-hover mb-0 align-middle">
                                        <thead class="table-dark">
                                        <tr>
                                            <th>Task</th>
                                            <th>Project</th>
                                            <th>Status</th>
                                            <th>Due Date</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="assignment : ${assignments}">
                                            <td th:text="${assignment.task.taskName}"></td>
                                            <td th:text="${assignment.task.project.projectName}"></td>
                                            <td th:text="${assignment.task.taskStatus}"></td>
                                            <td th:text="${assignment.task.dueDate}"></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

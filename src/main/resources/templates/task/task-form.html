<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Task</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 800px;">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">Create Task</h1>

            <div class="alert alert-info">
                <div><strong>Project:</strong> <span th:text="${project.projectName}"></span></div>
                <div><strong>Project ID:</strong> <span th:text="${project.projectId}"></span></div>
            </div>

            <form th:object="${task}"
                  th:action="@{/task/project/{projectId}/save(projectId=${project.projectId})}"
                  method="POST"
                  class="row g-3">
                <div class="col-12">
                    <label class="form-label">Task Name</label>
                    <input type="text" th:field="*{taskName}" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Due Date</label>
                    <input type="date" th:field="*{dueDate}" class="form-control">
                </div>
                <div class="col-12">
                    <h2 class="h5 mb-3">Assign Team Members</h2>
                    <div class="border rounded p-3 bg-body">
                        <div th:each="member : ${members}" class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{employeeIds}"
                                   th:value="${member.employee.employeeId}">
                            <label class="form-check-label" th:text="${member.employee.employeeId
                                                + ' - '
                                                + member.employee.firstName
                                                + ' '
                                                + member.employee.lastName}"></label>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

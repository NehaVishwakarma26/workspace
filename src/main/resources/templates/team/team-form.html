<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Create Team</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">Create Team</h1>

            <form th:object="${team}" th:action="@{/team/saveTeam}" method="POST" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Team Name</label>
                    <input type="text" th:field="*{teamName}" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>
                <div sec:authorize="hasRole('SUPER_ADMIN')" class="col-12">
                    <label class="form-label">Department</label>
                    <select th:field="*{department}" class="form-select">
                        <option th:each="deptOpt:${departments}"
                                th:value="${deptOpt}"
                                th:text="${deptOpt}"></option>
                    </select>
                </div>
                <div sec:authorize="hasRole('ADMIN')" class="col-12">
                    <div class="alert alert-info mb-0">
                        Team will be created in your department.
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create Team</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

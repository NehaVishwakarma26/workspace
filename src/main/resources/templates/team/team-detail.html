<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Team Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">Team Details</h1>
            <dl class="row mb-4">
                <dt class="col-sm-3">Team ID</dt>
                <dd class="col-sm-9" th:text="${team.teamId}"></dd>
                <dt class="col-sm-3">Team Name</dt>
                <dd class="col-sm-9" th:text="${team.teamName}"></dd>
                <dt class="col-sm-3">Description</dt>
                <dd class="col-sm-9" th:text="${team.description}"></dd>
                <dt class="col-sm-3">Department</dt>
                <dd class="col-sm-9" th:text="${team.department}"></dd>
                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9" th:text="${team.status}"></dd>
            </dl>

            <div class="d-flex gap-2">
                <a th:href="@{/team/{teamId}/members/add(teamId=${team.teamId})}" class="btn btn-primary">Add Member</a>
                <a th:href="@{/project/team/{teamId}/new(teamId=${team.teamId})}" class="btn btn-outline-primary">Create Project</a>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h4 mb-3">Team Members</h2>
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Employee ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Joined Date</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="member : ${members}">
                        <td th:text="${member.employee.employeeId}"></td>
                        <td th:text="${member.employee.firstName + ' ' + member.employee.lastName}"></td>
                        <td th:text="${member.teamMemberRole}"></td>
                        <td th:text="${member.joinedDate}"></td>
                        <td th:text="${member.status}"></td>
                        <td>
                            <form th:if="${member.status.name()=='ACTIVE'}"
                                  th:action="@{/team/{teamId}/members/{employeeId}/remove(teamId=${team.teamId},employeeId=${member.employee.employeeId})}"
                                  method="POST">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
                            </form>
                            <span th:if="${member.status.name()=='INACTIVE'}" class="text-muted">Removed</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h4 mb-3">Projects</h2>
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Project ID</th>
                        <th>Project Name</th>
                        <th>Status</th>
                        <th>Start Date</th>
                        <th>Due Date</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${projects}">
                        <td th:text="${project.projectId}"></td>
                        <td th:text="${project.projectName}"></td>
                        <td th:text="${project.projectStatus}"></td>
                        <td th:text="${project.startDate}"></td>
                        <td th:text="${project.dueDate}"></td>
                        <td>
                            <a th:href="@{/project/detail/{projectId}(projectId=${project.projectId})}" class="btn btn-sm btn-outline-primary">Details</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

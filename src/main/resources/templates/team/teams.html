<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>All Teams</title>
</head>
<body>

<h2>Teams</h2>

<table border="1">

    <thead>
    <tr>
        <th>Team ID</th>
        <th>Team Name</th>
        <th>Description</th>
        <th>Department</th>
        <th>Status</th>
        <th>Created Date</th>
        <th>Details</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="team: ${teams}">
        <td th:text="${team.teamId}"></td>
        <td th:text="${team.teamName}"></td>
        <td th:text="${team.description}"></td>
        <td th:text="${team.department}"></td>
        <td th:text="${team.status}"></td>
        <td th:text="${team.createdDate}"></td>
        <td>
            <a th:href="@{/team/detail/{teamId}(teamId=${team.teamId})}">
                <button type="button">Details</button>
            </a>
        </td>
    </tr>

    </tbody>

</table>

</body>
</html>

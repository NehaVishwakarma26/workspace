<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>All Teams</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="h3 mb-4">Teams</h1>
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Team ID</th>
                        <th>Team Name</th>
                        <th>Description</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th>Created Date</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="team: ${teams}">
                        <td th:text="${team.teamId}"></td>
                        <td th:text="${team.teamName}"></td>
                        <td th:text="${team.description}"></td>
                        <td th:text="${team.department}"></td>
                        <td th:text="${team.status}"></td>
                        <td th:text="${team.createdDate}"></td>
                        <td>
                            <a th:href="@{/team/detail/{teamId}(teamId=${team.teamId})}" class="btn btn-sm btn-outline-primary">Details</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
